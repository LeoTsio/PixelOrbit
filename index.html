<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PixelOrbit</title>
        <link rel="stylesheet" href="css/styles.css">
        <script type="module" src="js/main.js"></script>
        <script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script>
    </head>
    <body>
        <div class="top-bar">

            <img class="logo" src="assets/icons/nasa.png" alt="NASA Logo">

            <div class="craft-navigator" aria-label="Spacecraft picker">
                <div class="craft-track"></div>
            </div>
        </div>
        <main class="spacecraft-stage">
            <button class="side-arrow" id="previous">‹</button>

            <img id="craft-sprite" class="spacecraft-sprite" src="" alt="Spacecraft">

            <button class="side-arrow" id="next">›</button>
        </main>
        <div class="data-capsule">
            <div class="stat">
                <img class="stat-icon" id="stat1-icon" src="" alt="">
                <p class="stat-value" id="stat1-value"></p>
            </div>
            <div class="stat">
                <img class="stat-icon" id="stat2-icon" src="" alt="">
                <p class="stat-value" id="stat2-value"></p>
            </div>
            <div class="stat">
                <img class="stat-icon" id="stat3-icon" src="" alt="">
                <p class="stat-value" id="stat3-value"></p>
            </div>
        </div>
    </body>
</html>
